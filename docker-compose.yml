services:
  postgres:
    image: postgres:16
    container_name: movie_tracker_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: movie_tracker
    ports:
      - "5433:5432"
    volumes:
      - movie_tracker_postgres_data:/var/lib/postgresql/data

volumes:
  movie_tracker_postgres_data: